app = "pb-bythe-rocks"
primary_region = "lhr"

[build]

[env]
  PB_DATA_DIR = "/pb_data"
  PB_HTTP_ADDR = "0.0.0.0:8080"
  LITESTREAM_PATH = "pocketbase"

[[mounts]]
  source = "pb_data"
  destination = "/pb_data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[deploy]
  strategy = "immediate"
